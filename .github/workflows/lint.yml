name: lint
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 24
          cache: gradle
      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew
      - name: ktlintCheck
        run: ./gradlew ktlintCheck
